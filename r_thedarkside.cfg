// =====================
// thedarkside progressive mixed rotation for ~empire
// Design goals:
//   - Keep maps compact with low population; scale map size upward as server fills.
//   - Prefer CTF at all tiers (~60%) with DM/TDM front-loaded at low-mid tiers.
//   - Introduce HQ/DOM at mid-high tiers, BEL rarely in mid tiers.
//   - Respect suggested minimum player counts where practical.
// =====================

