// =====================
// thedarkside progressive mixed rotation for ~empire
// Design goals:
//   - Keep map pools large for variance at every player tier.
//   - Four tier model while still honoring low-player small-map bias.
//   - Target mode balance overall: CTF 60%, DM 10%, TDM 10%, HQ 15%, DOM 5%.
//   - BEL is intentionally rare and only appears in medium+ pools.
//   - HQ never appears below 8 players.
// =====================

